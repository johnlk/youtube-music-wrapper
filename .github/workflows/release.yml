name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  package-macos:
    name: Package macOS
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Package macOS app
        run: bun run package:mac

      - name: Resolve release tag
        id: release-tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Release tag is empty" >&2
            exit 1
          fi

          if [[ "${tag}" != v* ]]; then
            echo "Release tag must start with v, for example v0.1.0" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ steps.release-tag.outputs.tag }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          shopt -s nullglob
          artifacts=(release/*.dmg release/*.zip)

          if (( ${#artifacts[@]} == 0 )); then
            echo "No macOS release artifacts were produced" >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${artifacts[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${artifacts[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
