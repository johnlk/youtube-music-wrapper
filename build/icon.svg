<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title">
  <title>YouTube Music Wrapper icon</title>

  <!-- Squircle body sized to match Apple's Big Sur app icon template
       (~824/1024 of the canvas, centered, with transparent margin). -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="#0d0d0d"/>

  <!-- Centered play button, scaled proportionally to the new body size. -->
  <rect x="286" y="358" width="452" height="309" rx="80" fill="#f1ede4"/>
  <path d="M457 443 L594 512 L457 581 Z" fill="#0d0d0d"/>
</svg>
